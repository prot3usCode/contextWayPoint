title: Postgres Troubleshooting Patterns
uuid: postgres_troubleshooting_patterns_root
text: >
  This file stores reusable SQL investigation patterns that can be inserted into
  a routed context packet when a problem depends on query structure rather than
  only domain explanation.

entries:
  - title: SQL Latest Record Pattern
    uuid: sql_latest_record_pattern
    problems:
      - problem_name: Order Fulfillment Investigation
        problem_uuid:
        step_number: 2
        weight: 95
        keywords:
          - latest payment
          - latest shipment
          - row_number
          - window function
          - recent record

    text: >
      When the route asks for the most recent payment or shipment event, start
      with a latest-record query pattern. Pull the newest status row per order so
      downstream checks work from the current state rather than stale history.

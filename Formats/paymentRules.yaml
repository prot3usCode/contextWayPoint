title: Payment Rules
uuid: payment_rules_root
text: >
  Payment-specific fulfillment rules live here so they can be reused by multiple
  investigations without embedding them directly inside a single domain outline.

entries:
  - title: Payment Check
    uuid: payment_check
    problems:
      - problem_name: Order Fulfillment Investigation
        problem_uuid:
        step_number: 3
        weight: 95
        keywords:
          - payment
          - failed
          - authorized
          - captured
          - declined

    text: >
      Check the latest payment for the order. A failed or declined payment stops
      fulfillment immediately, while an authorized or captured payment keeps the
      route moving toward inventory and shipment checks.
